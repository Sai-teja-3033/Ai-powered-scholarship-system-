<!DOCTYPE html>
<html>
<head>
    <title>AI Scholarship Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎓 AI Scholarship Finder</h1>

<div class="form">
    <input type="number" id="marks" placeholder="Marks (%)">
    <input type="number" id="income" placeholder="Family Income">

    <select id="category">
        <option value="General">General</option>
        <option value="OBC">OBC</option>
        <option value="SC">SC</option>
        <option value="ST">ST</option>
    </select>

    <select id="field">
        <option value="Engineering">Engineering</option>
        <option value="Medical">Medical</option>
        <option value="Science">Science</option>
        <option value="Arts">Arts</option>
    </select>

    <button onclick="getRecommendations()">Find Scholarships</button>
</div>

<div id="results"></div>

<script src="script.js"></script>

</body>
</html>
