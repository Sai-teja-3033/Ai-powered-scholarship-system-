<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Scholarship Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>AI Powered Scholarship System</h1>
<p>Find scholarships based on your profile</p>
</header>

<div class="container">

<div class="card">
<h2>Student Profile</h2>

<label>Name</label>
<input type="text" id="name">

<label>Course</label>
<input type="text" id="course">

<label>Marks (%)</label>
<input type="number" id="marks">

<label>Family Income (₹)</label>
<input type="number" id="income">

<label>Category</label>
<select id="category">
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
<option>Minority</option>
</select>

<button onclick="findScholarships()">Find Scholarships</button>

</div>

<div class="card">
<h2>Recommended Scholarships</h2>
<div id="results"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
